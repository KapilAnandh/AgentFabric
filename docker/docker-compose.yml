services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: arp_user
      POSTGRES_PASSWORD: arp_pass
      POSTGRES_DB: arp_db
    ports:
      - "5432:5432"
    volumes:
      - arp_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    restart: unless-stopped

volumes:
  arp_postgres_data:
